<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <base href="%BASE_PATH%" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JetbyMC</title>
    <meta
      name="description"
      content="Современная вики с красивым интерфейсом и Markdown-страницами"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div>
            <img
              src="assets/icon.jpg"
              alt="JetbyMC"
              width="40"
              height="40"
              style="border-radius: 10%"
            />
          </div>
          <div>
            <h1>JetbyMC</h1>
          </div>
        </div>

        <label class="search-box" for="search">
          <span>⌕</span>
          <input id="search" type="search" placeholder="Поиск по разделам" />
        </label>

        <nav id="page-list" class="page-list" aria-label="Страницы wiki"></nav>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div class="topbar-left">
            <button
              class="sidebar-toggle"
              type="button"
              aria-label="Открыть меню"
            >
              <span></span>
              <span></span>
              <span></span>
            </button>
            <div>
              <p class="eyebrow">Документация</p>
              <h2 id="page-title">Загрузка…</h2>
            </div>
          </div>
          <div class="topbar-badge"></div>
        </header>

        <nav
          id="breadcrumbs"
          class="breadcrumbs"
          aria-label="Хлебные крошки"
        ></nav>
        <article id="content" class="content-card"></article>
        <nav
          id="doc-nav"
          class="doc-pagination"
          aria-label="Навигация по странице"
        ></nav>
      </main>
    </div>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div
      class="image-lightbox"
      id="image-lightbox"
      role="dialog"
      aria-label="Просмотр изображения"
    >
      <button class="image-lightbox-close" type="button" aria-label="Закрыть">
        ×
      </button>
      <img id="image-lightbox-image" src="" alt="" />
    </div>

    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-task-lists@2.1.0/dist/markdown-it-task-lists.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
