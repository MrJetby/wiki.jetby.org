name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 21

      - name: Generate pages-index.json
        run: node scripts/generate-pages-index.mjs

      - name: Resolve base path
        id: base
        run: |
          if [ -f "CNAME" ]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Inject base path
        run: |
          sed -i "s#%BASE_PATH%#${{ steps.base.outputs.path }}#g" index.html
          sed -i "s#%BASE_PATH%#${{ steps.base.outputs.path }}#g" 404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
